<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">BAG-DNA OS social preview</title>
  <desc id="description">BAG-DNA OS, the digital identity layer for every checked bag.</desc>
  <defs>
    <radialGradient id="cyanGlow" cx="76%" cy="28%" r="52%">
      <stop offset="0" stop-color="#6ed8e0" stop-opacity=".22"/>
      <stop offset="1" stop-color="#071522" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldGlow" cx="12%" cy="88%" r="52%">
      <stop offset="0" stop-color="#d7a93b" stop-opacity=".18"/>
      <stop offset="1" stop-color="#071522" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="46" height="46" patternUnits="userSpaceOnUse">
      <path d="M46 0H0V46" fill="none" stroke="#6ed8e0" stroke-opacity=".06"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="#071522"/>
  <rect width="1200" height="630" fill="url(#cyanGlow)"/>
  <rect width="1200" height="630" fill="url(#goldGlow)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <image href="https://bag-dna-os.vercel.app/bag-dna-logo.png" x="76" y="62" width="82" height="82" preserveAspectRatio="xMidYMid meet"/>
  <text x="180" y="100" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="700" letter-spacing="2">BAG-DNA OS</text>
  <text x="180" y="128" fill="#94a3b8" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" letter-spacing="4">AVIATION IDENTITY INFRASTRUCTURE</text>

  <text x="76" y="274" fill="#6ed8e0" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" letter-spacing="3">ISSUE · VERIFY · TRACK · PROTECT</text>
  <text x="76" y="354" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700" letter-spacing="-2">The digital identity layer</text>
  <text x="76" y="424" fill="#f8fafc" font-family="Arial, Helvetica, sans-serif" font-size="62" font-weight="700" letter-spacing="-2">for every checked bag.</text>

  <line x1="76" y1="526" x2="1124" y2="526" stroke="#ffffff" stroke-opacity=".14"/>
  <text x="76" y="572" fill="#a9b7c6" font-family="Arial, Helvetica, sans-serif" font-size="17">Chain-of-custody intelligence for modern aviation</text>
  <text x="1124" y="572" fill="#d7a93b" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" text-anchor="end">bag-dna-os.vercel.app</text>
</svg>
